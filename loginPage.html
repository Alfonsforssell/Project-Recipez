<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="assets/CSS/loginPage.css">
</head>

<body>
    <nav>
        <div id="left">
            <a href="index.html" class="returnBtn">↩</a>
        </div>
        <div id="mid"><img class="logo" src="assets/images/Logo.png" alt="Logo"></div>
        <div id="right">
        </div>
    </nav>
    <main>
        <form id="loginForm">
            <h1>Sign In</h1>
            <label>
                <input class="userName" type="text" placeholder="username...">
            </label>
            <label>
                <input class="password" type="password" placeholder="password...">
            </label>
            <button id="loginBtn">Login</button>
        </form>
        <form id="signUpForm">
            <h1>Sign Up</h1>
            <label>
                <input class="userName" type="text" placeholder="username...">
            </label>
            <label>
                <input class="password" type="password" placeholder="password...">
            </label>
            <label>
                <input id="repeatPassword" type="password" placeholder="Rewrite password...">
            </label>
            <button id="signUpBtn">Sign Up</button>
        </form>
    </main>
    <footer>

    </footer>
    <script src="assets/JS/frontend.js"></script>
    <script src="assets/JS/loginPage.js"></script>
</body>

</html>
