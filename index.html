<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipez</title>
    <link rel="stylesheet" href="assets/CSS/style.css">
</head>

<body>
    <nav>
        <div id="left"></div>
        <div id="mid"><img class="logo" src="assets/images/Logo.png" alt="Logo"></div>
        <div id="right">
            <a href="#"><img class="profilePic" src="assets/icons/profile.png" alt="profile"></a>
        </div>
    </nav>
    <hero>
        <img class="logo" src="assets/images/Logo.png" alt="Logo">
        <h1>Din nästa favoriträtt börjar här</h1>
    </hero>
    <main>
        <form>
            <label>
                Categories
                <select name="category" id="category">
                    <option value="All categories">All categories</option>
                </select>
            </label>
            <label>
                Countries
                <select name="country" id="country">
                    <option value="All countries">All countries</option>
                </select>
            </label>
            <label>
                Estimated Time
                <select name="time" id="time">
                    <option value="All">All</option>
                </select>
            </label>
            <label>
                Dietary preferences
                <select name="preference" id="preference">
                    <option value="Choose what to avoid">No preferences</option>
                </select>
            </label>
        </form>
        <div id="cards">
            <a class="card" href="#">
                <img class="card-img" src="assets/images/stroganoff.jpg" alt="">
                <h1>Korv Stroganoff</h1>
                <p>Korvstroganoff är en lättlagad och välsmakande korvgryta med bland annat falukorv, lök, grädde och
                    tomatpuré som passar bra som vardagsmiddag. Servera korvstroganoffen med kokt ris.</p>
                <div class="info">
                    <h2>30 min</h2>
                    <h2>Sweden</h2>
                    <img class="icon" src="assets/icons/fish.jpg" alt="">
                    <img class="icon" src="assets/icons/meat.jpg" alt="">
                    <img class="icon" src="assets/icons/vegan.jpg" alt="">
                </div>
            </a>
        </div>
    </main>
    <footer>

    </footer>
</body>

</html>
