<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipez</title>
    <link rel="stylesheet" href="assets/CSS/style.css">
</head>

<body>
    <nav>
        <div id="left"></div>
        <div id="mid"><img class="logo" src="assets/images/Logo.png" alt="Logo"></div>
        <div id="right">
            <a href="loginPage.html"><img class="profilePic" src="assets/icons/profile.png" alt="profile"></a>
        </div>
    </nav>
    <hero>
        <img class="logo" src="assets/images/Logo.png" alt="Logo">
        <h1>Din nästa favoriträtt börjar här</h1>
    </hero>
    <main>
        <form>
            <label>
                Länder
                <select name="country" id="country">
                    <option value="All countries">Alla länder</option>
                </select>
            </label>
            <label>
                Estimerad tid
                <select name="time" id="time">
                    <option value="All">Alla tider</option>
                </select>
            </label>
            <label>
                Diet preferenser
                <select name="preference" id="preference">
                    <option value="Choose what to avoid">Ingen preferens</option>
                </select>
            </label>
            <label>
                Filtrera
                <button id="filterbutton">≔</button>
            </label>

            <label id="searchField">
                Search
                <input type="text" placeholder="Search dish...">
            </label>
            <button id="searchbutton">↩</button>
        </form>
        <div id="cards">
        </div>
    </main>
    <footer>

    </footer>
    <script src="assets/JS/api.js"></script>
    <script src="assets/JS/frontend.js"></script>
    <script src="assets/JS/main.js"></script>
</body>

</html>
