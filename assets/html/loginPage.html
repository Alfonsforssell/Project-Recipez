<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/assets/CSS/loginPage.css">
</head>

<body>
    <nav>
        <div id="left">
            <a href="/assets/html/index.html" class="returnBtn">↩</a>
        </div>
        <div id="mid"><img class="logo" src="/assets/images/Logo.png" alt="Logo"></div>
        <div id="right">
        </div>
    </nav>
    <main>
        <form id="loginForm">
            <h1>Logga in</h1>
            <label>
                <input name="username" type="text" placeholder="Användarnamn...">
            </label>
            <label>
                <input name="password" type="password" placeholder="Lösenord...">
            </label>
            <button id="loginBtn">Logga in</button>
        </form>
        <form id="signUpForm">
            <h1>Registrera dig</h1>
            <label>
                <input name="username" type="text" placeholder="Användarnamn...">
            </label>
            <label>
                <input name="password" type="password" placeholder="Lösenord...">
            </label>
            <label>
                <input name="repeatPassword" type="password" placeholder="Bekräfta lösenord...">
            </label>
            <button id="signUpBtn">Registrera konto</button>
        </form>
    </main>
    <footer>

    </footer>
    <script src="/assets/JS/api.js"></script>
    <script src="/assets/JS/frontend.js"></script>
    <script src="/assets/JS/loginPage.js"></script>
</body>

</html>
