<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Dishes</title>
    <link rel="stylesheet" href="/assets/CSS/editPage.css">
</head>

<body>
    <nav>
        <div id="left">
            <a href="index.html" class="returnBtn">↩</a>
        </div>
        <div id="mid"><img class="logo" src="/assets/images/Logo.png" alt="Logo"></div>
        <div id="right">
            <a href="#"><img class="profilePic" src="/assets/icons/profile.png" alt="profile"></a>
        </div>
    </nav>
    <main>
        <form id="addDish">
            <h1>Add Dish</h1>
            <label>
                <h2>Name</h2>
                <input id="name" name="name" type="text" placeholder="Name of dish...">
            </label>
            <label>
                <h2>Description</h2>
                <textarea name="description" placeholder="Describe the dish..."></textarea>
            </label>
            <label>
                <h2>Country of origin</h2>
                <select name="country" id="country">
                    <option value="none">Select country</option>
                </select>
            </label>
            <label>
                <h2>Estimated time</h2>
                <input id="time" name="time" type="text" placeholder="Estimated time...">
            </label>
            <h2>Dietary</h2>
            <label class="diet">
                <input type="checkbox" class="dietary" value="1">
                Vegan
                <input type="checkbox" class="dietary" value="2">
                Meat-free
                <input type="checkbox" class="dietary" value="3">
                Lactose-free
                <input type="checkbox" class="dietary" value="4">
                Gluten-free
                <input type="checkbox" class="dietary" value="5">
                Fish-free
                <input type="checkbox" class="dietary" value="6">
                Halal
                <input type="checkbox" class="dietary" value="7">
                Healty
            </label>
            <h2>Ingredients</h2>
            <div class="ingredients-input">
                <div id="tags"></div>
                <input type="text" id="ingredientInput" placeholder="Add ingredient...">
            </div>
            <label>
                <h2>Instructions</h2>
                <textarea name="instructions" placeholder='Please use "." to differ every step'></textarea>
            </label>
            <label>
                <h2>Image URL</h2>
                <input id="image" name="image" type="text" placeholder="http://....">
            </label>
            <button class="btn">Add dish</button>
        </form>
        <form id="changeDish">
            <h1>Change Dish</h1>
            <label>
                <h2>Name</h2>
                <select name="name" id="name">
                    <option value="none">Choose dish...</option>
                </select>
            </label>
            <label>
                <h2>Description</h2>
                <textarea name="description" placeholder="Describe the dish..."></textarea>
            </label>
            <label>
                <h2>Country of origin</h2>
                <select name="country" id="country">
                    <option value="none">Select country</option>
                </select>
            </label>
            <label>
                <h2>Estimated time</h2>
                <input id="time" type="text" placeholder="Estimated time...">
            </label>
            <h2>Dietary</h2>
            <label class="diet">
                <input type="checkbox" class="dietary" value="1">
                Vegan
                <input type="checkbox" class="dietary" value="2">
                Meat-free
                <input type="checkbox" class="dietary" value="3">
                Lactose-free
                <input type="checkbox" class="dietary" value="4">
                Gluten-free
                <input type="checkbox" class="dietary" value="5">
                Fish-free
                <input type="checkbox" class="dietary" value="6">
                Halal
                <input type="checkbox" class="dietary" value="7">
                Healty
            </label>
            <h2>Ingredients</h2>
            <div class="ingredients-input">
                <div id="tags"></div>
                <input type="text" id="ingredientInput" placeholder="Add ingredient...">
            </div>
            <label>
                <h2>Instructions</h2>
                <textarea name="instructions" placeholder='Please use "." to differ every step'></textarea>
            </label>
            <label>
                <h2>Image URL</h2>
                <input id="image" type="text" placeholder="http://....">
            </label>
            <div id="buttons">
                <button class="changeBtn">Change dish</button>
                <button class="deleteBtn">Delete dish</button>
            </div>
        </form>
    </main>
    <script src="/assets/JS/api.js"></script>
    <script src="/assets/JS/frontend.js"></script>
    <script src="/assets/JS/editPage.js"></script>
</body>

</html>
