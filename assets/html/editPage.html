<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Dishes</title>
    <link rel="stylesheet" href="/assets/CSS/editPage.css">
</head>

<body>
    <nav>
        <div id="left">
            <a href="/assets/html/index.html" class="returnBtn">↩</a>
        </div>
        <div id="mid"><img class="logo" src="/assets/images/Logo.png" alt="Logo"></div>
        <div id="right">
            <a href="#"><img class="profilePic" src="/assets/icons/profile.png" alt="profile"></a>
        </div>
    </nav>
    <main>
        <form id="addDish">
            <h1>Lägg till rätt</h1>
            <label>
                <h2>Name</h2>
                <input id="name" name="name" type="text" placeholder="Namnge rätt...">
            </label>
            <label>
                <h2>Description</h2>
                <textarea name="description" placeholder="Beskriv rätten..."></textarea>
            </label>
            <label>
                <h2>Ursprungsland</h2>
                <select name="country" id="country">
                    <option value="none">Välj land</option>
                </select>
            </label>
            <label>
                <h2>Beräknad tid</h2>
                <input id="time" name="time" type="text" placeholder="Beräknad tid...">
            </label>
            <h2>Diet</h2>
            <label class="diet">
                <input type="checkbox" class="dietary" value="1">
                Veganskt
                <input type="checkbox" class="dietary" value="2">
                Vegetariskt
                <input type="checkbox" class="dietary" value="3">
                Laktosfritt
                <input type="checkbox" class="dietary" value="4">
                Glutenfritt
                <input type="checkbox" class="dietary" value="5">
                Utan fisk
                <input type="checkbox" class="dietary" value="6">
                Halal
                <input type="checkbox" class="dietary" value="7">
                Hälsosamt
            </label>
            <h2>Ingredienser</h2>
            <div class="ingredients-input">
                <div id="tags"></div>
                <input type="text" id="ingredientInput" placeholder="Lägg till ingrediens...">
            </div>
            <label>
                <h2>Instruktioner</h2>
                <textarea name="instructions" placeholder='Använd "." för att skilja varje steg åt.'></textarea>
            </label>
            <label>
                <h2>Bild URL</h2>
                <input id="image" name="image" type="text" placeholder="http://....">
            </label>
            <button class="btn">Lägg till rätt</button>
        </form>
        <form id="changeDish">
            <h1>Ändra rätt</h1>
            <label>
                <h2>Namn</h2>
                <select name="name" id="name">
                    <option value="none">Välj rätt...</option>
                </select>
            </label>
            <label>
                <h2>Beskrivning</h2>
                <textarea name="description" placeholder="Beskriv rätten..."></textarea>
            </label>
            <label>
                <h2>Ursprungsland</h2>
                <select name="country" id="country">
                    <option value="none">Välj land</option>
                </select>
            </label>
            <label>
                <h2>Beräknad tid</h2>
                <input id="time" type="text" placeholder="Beräknad tid...">
            </label>
            <h2>Diet</h2>
            <label class="diet">
                <input type="checkbox" class="dietary" value="1">
                Veganskt
                <input type="checkbox" class="dietary" value="2">
                Vegetariskt
                <input type="checkbox" class="dietary" value="3">
                Laktosfritt
                <input type="checkbox" class="dietary" value="4">
                Glutenfritt
                <input type="checkbox" class="dietary" value="5">
                Utan fisk
                <input type="checkbox" class="dietary" value="6">
                Halal
                <input type="checkbox" class="dietary" value="7">
                Hälsosamt
            </label>
            <h2>Ingredienser</h2>
            <div class="ingredients-input">
                <div id="tags"></div>
                <input type="text" id="ingredientInput" placeholder="Lägg till ingredienser...">
            </div>
            <label>
                <h2>Instruktioner</h2>
                <textarea name="instructions" placeholder='Använd "." för att skilja varje steg åt.'></textarea>
            </label>
            <label>
                <h2>Bild URL</h2>
                <input id="image" type="text" placeholder="http://....">
            </label>
            <div id="buttons">
                <button class="changeBtn">Ändra rätt</button>
                <button class="deleteBtn">Radera rätt</button>
            </div>
        </form>
    </main>
    <script src="/assets/JS/api.js"></script>
    <script src="/assets/JS/frontend.js"></script>
    <script src="/assets/JS/editPage.js"></script>
</body>

</html>
